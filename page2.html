<!DOCTYPE html>
<html>
<head>
  <title>Special</title>

  <style>
    body {
      background: linear-gradient(to right, pink, lightpink);
      text-align: center;
      font-family: Arial;
      overflow: hidden;
      padding-top: 100px;
    }

    h2 {
      font-size: 28px;
      color: deeppink;
      min-height: 80px;
    }

    /* gift */
    .gift {
      width: 120px;
      cursor: pointer;
      margin-top: 30px;
      transition: 0.3s;
    }

    .gift:hover {
      transform: scale(1.2) rotate(10deg);
    }

    /* hearts */
    .heart {
      position: fixed;
      bottom: -10px;
      color: red;
      animation: floatUp 5s linear infinite;
    }

    @keyframes floatUp {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }
  </style>
</head>

<body>

<h2 id="text"></h2>

<!-- 🎁 Gift -->
<img class="gift" 
src="https://cdn-icons-png.flaticon.com/512/3468/3468373.png"
onclick="goNext()">

<p>Click the gift 🎁</p>

<script>
/* typing effect */
let msg = "Before this... I want to tell you something 💌\nYou are the reason behind my smile 😊\nAnd today... I want to ask you something special 💖";
let i = 0;

function typing() {
  if (i < msg.length) {
    document.getElementById("text").innerHTML += msg.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}

typing();

/* next page */
function goNext() {
  window.location.href = "page3.html";
}

/* hearts */
function createHeart() {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "💖";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
